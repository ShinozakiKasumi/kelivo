name: Fork Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish APK/AAB to this repository release'
        required: true
        default: true
        type: boolean

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  android:
    name: Android release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Read version and release mode
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          if [ -z "$VERSION" ]; then
            echo "Failed to read version from pubspec.yaml" >&2
            exit 1
          fi

          PUBLISH_RELEASE=false
          if [ "${{ github.event_name }}" = "push" ]; then
            PUBLISH_RELEASE=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish_release }}" = "true" ]; then
            PUBLISH_RELEASE=true
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=v$VERSION" >> "$GITHUB_ENV"
          echo "PUBLISH_RELEASE=$PUBLISH_RELEASE" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
          echo "Publish release: $PUBLISH_RELEASE"

      - name: Validate Android signing secrets
        if: steps.meta.outputs.publish_release == 'true'
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${KEYSTORE_BASE64:-}" ] || missing+=(KEYSTORE_BASE64)
          [ -n "${STORE_PASSWORD:-}" ] || missing+=(STORE_PASSWORD)
          [ -n "${KEY_PASSWORD:-}" ] || missing+=(KEY_PASSWORD)
          [ -n "${ALIAS:-}" ] || missing+=(ALIAS)

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required signing secret(s) for publishing release: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Decode Android keystore
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_BASE64:-}" ] && \
             [ -n "${STORE_PASSWORD:-}" ] && \
             [ -n "${KEY_PASSWORD:-}" ] && \
             [ -n "${ALIAS:-}" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks
            echo "SIGNING_MODE=signed" >> "$GITHUB_ENV"
            echo "signing_mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "Signing secrets are not fully configured; building unsigned release artifacts."
            echo "SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
            echo "signing_mode=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        env:
          STORE_FILE: release-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: flutter build apk --release

      - name: Build AAB
        env:
          STORE_FILE: release-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: flutter build appbundle --release

      - name: Stage artifacts
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SIGNING_MODE: ${{ steps.signing.outputs.signing_mode }}
        run: |
          set -euo pipefail
          mkdir -p artifacts

          apk_path=$(find build/app/outputs -type f -name 'app-release*.apk' | sort | head -n 1)
          aab_path=$(find build/app/outputs -type f -name 'app-release*.aab' | sort | head -n 1)

          if [ -z "${apk_path:-}" ] || [ -z "${aab_path:-}" ]; then
            echo "Android release artifacts were not found." >&2
            find build/app/outputs -type f >&2 || true
            exit 1
          fi

          cp "$apk_path" "artifacts/Kelivo-android-${VERSION}-${SIGNING_MODE}.apk"
          cp "$aab_path" "artifacts/Kelivo-android-${VERSION}-${SIGNING_MODE}.aab"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kelivo-android-${{ steps.meta.outputs.version }}-${{ steps.signing.outputs.signing_mode }}
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.meta.outputs.publish_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          SIGNING_MODE: ${{ steps.signing.outputs.signing_mode }}
        run: |
          set -euo pipefail
          notes_file=$(mktemp)
          cat > "$notes_file" <<EOF
          Fork Android release for Kelivo ${VERSION}.

          - Flutter: ${FLUTTER_VERSION}
          - Commit: ${GITHUB_SHA}
          - Signing: ${SIGNING_MODE}
          - Artifacts: APK and AAB
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/* --clobber
          else
            gh release create "$TAG_NAME" artifacts/* \
              --target "$GITHUB_SHA" \
              --title "Kelivo ${VERSION}" \
              --notes-file "$notes_file"
          fi
